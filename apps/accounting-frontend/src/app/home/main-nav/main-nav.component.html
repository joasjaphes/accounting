<mat-toolbar color="primary">
  <div>
    <mat-icon style="cursor: pointer;" color="white" *ngIf="(isHandset$ | async)" (click)="drawer.toggle()">menu</mat-icon>
  </div>
</mat-toolbar>
<mat-sidenav-container>
  <mat-sidenav #drawer [opened]=" (isHandset$ | async) ? false : true" [mode]="(isHandset$ | async) ? 'over' : 'side'">Menu</mat-sidenav>
  <mat-sidenav-content>
    <div class="mat-elevation-z3 content">Content</div>
  </mat-sidenav-content>
</mat-sidenav-container>
