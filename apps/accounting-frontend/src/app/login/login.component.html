<div class="content-container  d-flex justify-content-center align-items-center">
    <div class="login-form-container mat-elevation-z3">
        <form action="">
            <div class="row">
                <div class="col-sm-12">
                    <mat-form-field appearance="standard">
                        <mat-label>User name</mat-label>
                        <i class="fa fa-user" style="color: #2596be;" matPrefix aria-hidden="true"></i>
                        <input type="text" matInput>
                    </mat-form-field>
                </div>
                <div class="col-sm-12">
                    <mat-form-field appearance="standard">
                        <mat-label>Password</mat-label>
                        <i class="fa fa-lock" matPrefix aria-hidden="true" style="color: #2596be;"></i>
                        <input type="text" matInput>
                    </mat-form-field>
                </div>

                <div class="col-sm-12">
                    <button mat-raised-button class="login-btn">Login</button>
                </div>
                <div class="col-sm-12 mt-2" align="center" style="color: #2596be;">
                    <b>OR</b>
                </div>
                <div class="col-sm-12" align="center" style="color: #2596be;">
                    <button mat-button>Create account</button>
                </div>
            </div>
        </form>
    </div>
</div>
