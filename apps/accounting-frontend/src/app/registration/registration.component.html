<div class="content-container  d-flex justify-content-center align-items-center" [ngClass]="routeElements">
    <div class="registration-form-container mat-elevation-z3" @fadeIn>
        <form [formGroup]="registrationForm">
          <div class="row"  >
            <div class="col-sm-12">
              <mat-form-field appearance="outline">
                <mat-label>First name</mat-label>
                <input type="text" matInput formControlName="firstname" />
              </mat-form-field>
            </div>
            <div class="col-sm-12">
              <mat-form-field appearance="outline">
                <mat-label>Surname</mat-label>
                <input type="text" matInput formControlName="surname" />
              </mat-form-field>
            </div>
            <div class="col-sm-12">
              <mat-form-field appearance="outline">
                <mat-label>Last name</mat-label>
                <input type="text" matInput formControlName="lastname" />
              </mat-form-field>
            </div>
            <div class="col-sm-6">
              <mat-form-field appearance="outline">
                <mat-label>Email</mat-label>
                <input type="text" matInput formControlName="email" />
              </mat-form-field>
            </div>
            <div class="col-sm-6">
              <mat-form-field appearance="outline">
                <mat-label>Phone number</mat-label>
                <input type="text" matInput formControlName="phoneNumber" />
              </mat-form-field>
            </div>
            <div class="col-sm-12">
              <mat-form-field appearance="outline">
                <mat-label>Username</mat-label>
                <input type="text" matInput formControlName="username" />
              </mat-form-field>
            </div>
            <div class="col-sm-6">
              <mat-form-field appearance="outline">
                <mat-label>Password</mat-label>
                <input type="text" matInput formControlName="password" />
              </mat-form-field>
            </div>
            <div class="col-sm-6">
              <mat-form-field appearance="outline">
                <mat-label>Confirm password</mat-label>
                <input type="text" formControlName="confirmPass" matInput />
                <mat-hint *ngIf="passwordMissmatch" style="color: red;">*Password not match</mat-hint>
              </mat-form-field>
            </div>
            <div class="col-sm-6">
              <button mat-raised-button  style="width: 100%; background-color: red; color: white; font-weight: bold;" type="button" [routerLink]="'/login'">Cancel</button>
            </div>
            <div class="col-sm-6">
              <button mat-raised-button color="primary" style="width: 100%; font-weight: bold;" type="button" (click)="onSave()">Submit</button>
            </div>
            <div class="col-sm-12" *ngIf="loading" @fadeIn>
              <accounting-loading></accounting-loading>
            </div>
          </div>
        </form>
    </div>
</div>
